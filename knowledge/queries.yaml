## 4. 基金查询

### 天天基金网
- 净值查询：`https://fund.eastmoney.com/pingzhongdata/基金代码.js`

### 基金代码规则
- 场外基金：6位数字，如 161039（易方达增强回报）
- 场内基金（ETF）：以 5 开头（沪市）或 1 开头（深市）

---

## 5. 注意事项

1. **频率限制**：免费API有请求频率限制，不要高频调用
2. **数据延迟**：免费接口通常有15分钟延迟
3. **用途限制**：仅供个人学习研究，不要用于商业用途
4. **HTTPS vs HTTP**：部分接口可能需要HTTP（新浪支持HTTPS）
5. **编码问题**：返回数据可能编码不一致，注意处理UTF-8/GBK

