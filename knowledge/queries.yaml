# 中国A股和基金实时行情查询方法

## 1. 常用免费API接口

### 新浪财经 API（最常用，无需API Key）
- **股票实时行情**：`https://hq.sinajs.cn/list=sh600000`（上海）/`sz000001`（深圳）
- **大盘指数**：`https://hq.sinajs.cn/list=s_sh000001`（上证指数）/`s_sz399001`（深证成指）
- **基金净值**：`https://hq.sinajs.cn/list=f_161039`（示例：易方达增强回报）
- 返回格式：纯文本，需要解析

### 腾讯财经 API
- **股票行情**：`https://qt.gtimg.cn/q=sh600000`（上海）/`sz000001`（深圳）
- 返回格式：JSON-like，比较好解析

### 东方财富 API
- **股票行情**：`https://push2.eastmoney.com/api/qt/stock/get?secid=1.600000`（上海）/`0.000001`（深圳）
- **基金净值**：`https://fund.eastmoney.com/pingzhongdata/161039.js`
- 返回格式：JSON

### 网易财经 API
- **股票行情**：`http://quotes.money.163.com/service/chddata.html?code=0600000&start=20200101&end=20201231`

---

## 2. 股票代码格式

| 市场 | 代码前缀 | 示例 | 说明 |
|------|----------|------|------|
| 上海主板 | 600, 601, 603 | 600000, 601398, 603259 | 大型蓝筹股 |
| 深圳主板 | 000, 001 | 000001, 000002 | 主板上市公司 |
| 创业板 | 300 | 300750, 300059 | 创新型企业 |
| 科创板 | 688 | 688111, 688981 | 科技创新企业 |
| 北交所 | 4, 8 | 430001, 830799 | 北京证券交易所 |
| 沪市基金 | 5xx | 510500, 512880 | 交易所ETF |
| 深市基金 | 1xx, 1x6 | 159919, 161039 | 场外/场内基金 |

**代码标识前缀**：
- `sh` 或 `1` = 上海证券交易所
- `sz` 或 `0` = 深圳证券交易所
- `bj` = 北京证券交易所

---

## 3. 实时行情查询示例

### Python 示例（使用新浪API）
```python
import requests

def get_stock_price(code):
    # 上海sh600000, 深圳sz000001
    symbol = f"sh{code}" if code.startswith(('600', '601', '603', '688')) else f"sz{code}"
    url = f"https://hq.sinajs.cn/list={symbol}"
    resp = requests.get(url)
    data = resp.text.split('=')[1].strip('"')
    fields = ['name', 'open', 'preclose', 'close', 'high', 'low', 'volume', 'amount']
    return dict(zip(fields, data.split(',')))

price = get_stock_price('600000')
print(price)
```

### Shell + curl 示例
```bash
# 查询上证指数
curl -s "https://hq.sinajs.cn/list=s_sh000001"

# 查询单个股票
curl -s "https://hq.sinajs.cn/list=sh600000"

# 查询基金
curl -s "https://hq.sinajs.cn/list=f_161039"
```

