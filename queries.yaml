# 查询知识库

examples:
  - name: 港股网易股价
    description: 查询网易港股(9999.HK)实时或收盘价格
    source: https://www.investing.com/equities/netease-inc
    query_method: 使用 Brave Search 搜索 "港股+股票代码+股价" 或直接访问 investing.com
    updated: 2026-03-12
    
  - name: Steam热门游戏
    description: Steam当前在线人数前20的游戏
    source: https://api.steampowered.com/ISteamChartsService/GetMostPlayedGames/v1/
    query_method: 调用 Steam 官方 API 获取最热玩游戏榜单
    updated: 2026-03-12

  - name: 港股美股查询
    description: 查询各种股票实时行情
    source: Brave Search + investing.com / Yahoo Finance / CNBC
    query_method: |
      搜索方式：
      1. Brave Search API: curl -s "https://api.search.brave.com/res/v1/web/search?q=股票名称+股价"
      2. 主要数据源：investing.com、Yahoo Finance、CNBC、Bloomberg
      3. 关键词：港股用"HK"后缀，美股用"NASDAQ"或""
    updated: 2026-03-12

  - name: 航班价格查询
    description: 查询特定航班号的历史价格和当前价格
    source: Google Flights, Skyscanner, 携程, 海航官网
    query_method: |
      搜索方式：
      1. Google Search: "航班号+价格+日期" 如 "HU7892 机票价格 2026年3月"
      2. 直接访问 Google Flights / Skyscanner / 携程
      3. 航班号格式：航空公司代码+数字，如 HU7892, CA1520
      注意：提前几个月查询价格较准，过早查询可能无价格
    updated: 2026-03-12
